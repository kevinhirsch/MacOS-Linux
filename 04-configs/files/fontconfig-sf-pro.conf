<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Tahoe-Liquid-Glass · SF Pro fontconfig
  Installed to ~/.config/fontconfig/conf.d/50-sf-pro.conf

  Purpose:
    * Make "SF Pro Text" / "SF Pro Display" resolve even if only one of the SF
      Pro families is installed, and give a clean fallback chain so UI never
      falls back to an ugly bitmap font.
    * Apple ships SF Pro under names like "SF Pro Text", "SF Pro Display",
      ".SF NS Text". We alias the dotted internal names to the public ones.

  SF Pro is NOT redistributable — install it yourself (Apple's SF font pkg, or
  an open metric-compatible substitute such as "Inter" mapped below). If SF Pro
  is absent, this maps SF Pro -> Inter -> Noto Sans so the desktop still looks
  right.
-->
<fontconfig>
  <!-- Normalize Apple's internal names to the public family names. -->
  <match target="pattern">
    <test name="family"><string>.SF NS Text</string></test>
    <edit name="family" mode="assign" binding="strong"><string>SF Pro Text</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>.SF NS Display</string></test>
    <edit name="family" mode="assign" binding="strong"><string>SF Pro Display</string></edit>
  </match>

  <!-- If SF Pro Text is requested but missing, substitute a metric-compatible
       family, then generic sans. Order matters: Inter first, then Noto Sans. -->
  <alias binding="strong">
    <family>SF Pro Text</family>
    <prefer>
      <family>SF Pro Text</family>
      <family>Inter</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>SF Pro Display</family>
    <prefer>
      <family>SF Pro Display</family>
      <family>SF Pro Text</family>
      <family>Inter</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <!-- Make the generic "sans-serif" resolve to SF Pro Text so GTK/apps that ask
       for the generic family also get the Tahoe UI face. -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>SF Pro Text</family></prefer>
  </alias>

  <!-- SF Pro renders best with slight hinting + full antialiasing. -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
</fontconfig>
