# Tahoe-Liquid-Glass · GTK global-menu export
# Installed to ~/.config/environment.d/50-appmenu-gtk.conf
# Read by the systemd user session at login (Plasma 6 Wayland + X11).
#
# Makes GTK2/GTK3 apps export their menubar over the com.canonical.dbusmenu
# protocol so it shows in the Plasma Global Menu applet (App / File / Edit …
# order is whatever the app defines; we only enable the export).
#
# Requires the distro package that provides appmenu-gtk-module
# (Debian/Ubuntu: appmenu-gtk2-module + appmenu-gtk3-module;
#  Arch: appmenu-gtk-module; Fedora: not packaged — build vala-panel-appmenu).
#
# NOTE: environment.d does not do shell conditionals, so we set GTK_MODULES
# outright. If you already rely on other GTK modules, list them colon-joined:
#   GTK_MODULES=canberra-gtk-module:appmenu-gtk-module
GTK_MODULES=appmenu-gtk-module
UBUNTU_MENUPROXY=1
